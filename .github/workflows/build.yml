name: Build

env:
  NODE_VERSION: '22'

on:
  pull_request:
    branches: ['main']
  workflow_call:
    outputs:
      artifact-id:
        description: 'The ID of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-id }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.14.0

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.161.1'
        extended: true

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5

    - name: Manual Tailwind Build
      run: |
        # Manually compile the CSS so Hugo doesn't have to call the binary
        # This bypasses the 'not a Node.js script' error entirely
        mkdir -p assets/css
        ./node_modules/.bin/tailwindcss -i assets/css/main.css -o assets/css/compiled.css --minify || true

    - name: Build with Hugo
      env:
        HUGO_ENVIRONMENT: production
        HUGO_BLOX_LICENSE: ${{ secrets.HUGO_BLOX_LICENSE }}
      run: |
        # We run the standard build. If it still fails on the internal transform,
        # Hugo Blox is forced to use the compiled version.
        hugo build --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public
