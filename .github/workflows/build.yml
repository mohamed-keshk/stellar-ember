name: Build

env:
  NODE_VERSION: '20'

on:
  pull_request:
    branches: ['main']
  workflow_call:
    outputs:
      artifact-id:
        description: 'The ID of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-id }}
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.14.0 # Matching your package.json

    - name: Get Hugo Version
      id: hugo-version
      run: |
        YQ_VERSION="v4.44.1"
        wget -q -O /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
        sudo mv /tmp/yq /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq
        VERSION=$(yq '.build.hugo_version' hugoblox.yaml)
        echo "HUGO_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Install Dependencies
      run: |
        # Install dependencies using pnpm without requiring a lockfile
        pnpm install --no-frozen-lockfile
        
        # Manually ensure the standalone Tailwind binary is in the PATH
        # Hugo's Tailwind v4 integration often prefers the standalone binary
        curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
        chmod +x tailwindcss-linux-x64
        sudo mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: ${{ env.HUGO_VERSION }}
        extended: true

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5

    - name: Build with Hugo
      env:
        HUGO_ENVIRONMENT: production
        HUGO_BLOX_LICENSE: ${{ secrets.HUGO_BLOX_LICENSE }}
        # Crucial for finding Preact during JS build
        NODE_PATH: ${{ github.workspace }}/node_modules
      run: |
        hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

    - name: Generate Pagefind Search
      run: |
        pnpm run pagefind

    - name: Upload artifact
      id: upload
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public
